---
name: AI Implement

on:
  issue_comment:
    types:
      - created

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  implement:
    if: ${{ startsWith( github.event.comment.body, '/ai-implement' ) }}
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: "ai-implement-issue-${{ github.event.issue.number }}"
      COMMENT_BODY: ${{ github.event.comment.body }}
      ISSUE_TITLE: ${{ github.event.issue.title }}
      ISSUE_BODY: ${{ github.event.issue.body }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check collaborator
        uses: actions/github-script@v8
        with:
          script: |
            const checkCollaborator = require('.github/scripts/check-collaborator.js');
            await checkCollaborator({
              github,
              context,
              core,
              username: '${{ github.event.comment.user.login }}',
              requiredPermission: 'write'
            });

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Aider
        run: pip install --upgrade pip && pip install aider-chat

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Get Issue Comments
        id: comments
        uses: actions/github-script@v8
        with:
          script: |
            const listComments = require('./.github/scripts/list-comments.js');
            return await listComments({ github, context, core });

      - name: Create and checkout new branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          if git show-ref --verify --quiet refs/heads/"$BRANCH_NAME"; then
            echo "Branch $BRANCH_NAME already exists locally, checking it out"
            git checkout "$BRANCH_NAME"
          elif git show-ref --verify --quiet refs/remotes/origin/"$BRANCH_NAME"; then
            echo "Branch $BRANCH_NAME exists on remote, checking it out"
            git checkout -b "$BRANCH_NAME" origin/"$BRANCH_NAME"
            git pull origin "$BRANCH_NAME"
          else
            echo "Creating new branch $BRANCH_NAME"
            git checkout -b "$BRANCH_NAME"
            git push --set-upstream origin "$BRANCH_NAME"
          fi

      - name: Get HEAD hash
        id: head
        run: |
          echo "head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup agent state directory
        run: |
          mkdir -p agents/state

      - name: Generate coder instructions
        env:
          ALL_COMMENTS: ${{ steps.comments.outputs.result }}
        run: |
          PROMPT=$(cat agents/architect-prompt.txt)
          aider \
          --model openrouter/anthropic/claude-3.7-sonnet \
          --architect \
          --yes-always \
          --edit-format whole \
          --map-refresh always \
          --read Architecture.md \
          --file agents/state/tests.md \
          --file agents/state/implementation.md \
          --auto-commits \
          --message "
          ${PROMPT}

          Task:
          Using the issue description below, give general instructions to the implementer regarding:
            - Which TDD tests to write to verify the implementation or change.
            - Which classes, functions or methods to implement or change (in 'agents/state/implementation.md').
          Put tests instructions in 'agents/state/tests.md'.
          Put implementation instructions in 'agents/state/implementation.md'.
          Pay particular attention to issues or comments created by the owner or yourself.
          Sign off as 'Pydontology Team Architect'.

          Issue Context:
          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Original Issue Description:
          ${ISSUE_BODY}

          Full Comment History:
          ${ALL_COMMENTS}
          "

      - name: Write tests
        run: |
          PROMPT=$(cat agents/coder-prompt.txt)
          aider \
          --model openrouter/anthropic/claude-3.7-sonnet \
          --yes-always \
          --map-refresh always \
          --edit-format whole \
          --read agents/state/tests.md \
          --auto-commits \
          --message "
          ${PROMPT}

          Task:
          Follow the instructions of the Architect in 'agents/state/tests.md' to write the tests.
          "

      - name: Write implementation
        run: |
          PROMPT=$(cat agents/coder-prompt.txt)
          aider \
          --model openrouter/anthropic/claude-3.7-sonnet \
          --yes-always \
          --map-refresh always \
          --edit-format whole \
          --read agents/state/implementation.md \
          --auto-commits \
          --test-cmd "python -m pytest" \
          --auto-test \
          --message "
          ${PROMPT}

          Task:
          Follow the instructions of the Architect in 'agents/state/implementation.md' to write the implementation.
          "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: implement
          path: agents/state/

      - name: Restore agent state dir
        run: |
          git restore --source=${{ steps.head.outputs.head }} --staged --worktree -- agents/
          git add .
          git commit -m "Restore agent dir"

      - name: Push changes
        run: |
          git push origin

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "AI Implementation: ${{ github.event.issue.title }}" \
            --body "Automated implementation for issue #${{ github.event.issue.number }}

          This pull request was automatically generated by the AI implementation workflow.

          Closes #$ISSUE_NUMBER" \
            --head "$BRANCH_NAME" \
            --base main
