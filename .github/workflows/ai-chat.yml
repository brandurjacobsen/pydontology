---
name: AI Chat

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write

jobs:
  chat:
    if: ${{ startsWith( github.event.comment.body, '/ai-chat' ) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check collaborator
        uses: actions/github-script@v8
        with:
          script: |
            const checkCollaborator = require('.github/scripts/check-collaborator.js');
            await checkCollaborator({
              github,
              context,
              core,
              username: '${{ github.event.comment.user.login }}',
              requiredPermission: 'write'
            });

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Aider
        run: pip install --upgrade pip && pip install aider-chat

      - name: Get Issue Comments
        id: comments
        uses: actions/github-script@v8
        with:
          script: |
            const listComments = require('./.github/scripts/list-comments.js');
            return await listComments({ github, context, core });

      - name: Setup agent state directory
        run: |
          mkdir -p agents/state

      - name: AI Chat
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ALL_COMMENTS: ${{ steps.comments.outputs.result }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          PROMPT=$(cat agents/architect-prompt.txt)
          aider \
          --model openrouter/openai/gpt-4.1 \
          --yes-always \
          --architect \
          --edit-format whole \
          --read Architecture.md \
          --file agents/state/reply.md \
          --message "
          ${PROMPT}

          Task:
          Respond to latest issue comment by writing to 'agents/state/reply.md',
          paying special attention to previous comments by the owner and yourself.

          Issue Context:
          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Original Issue Description:
          ${ISSUE_BODY}

          Full Comment History:
          ${ALL_COMMENTS}

          Latest Comment to Respond To:
          ${COMMENT_BODY}"

          # Add sign-off
          echo "" >> agents/state/reply.md
          echo "---" >> agents/state/reply.md
          echo "Regards, Pydontology Team Architect" >> agents/state/reply.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chat
          path: agents/state/

      - name: Reply to Issue Comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const reply = fs.readFileSync('agents/state/reply.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reply
            })
