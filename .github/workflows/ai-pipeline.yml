---
name: AI-Pipeline

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read
  issues: write

jobs:
  chat:
    if: ${{ startsWith( github.event.comment.body, '/ai-chat' ) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Aider
        run: pip install --upgrade pip && pip install aider-chat

      - name: Get All Comments
        id: comments
        uses: actions/github-script@v8
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });
            return comments.data.map(c => `**${c.user.login}** (${c.created_at}):\n${c.body}`).join('\n\n---\n\n');

      - name: AI Chat
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ALL_COMMENTS: ${{ steps.comments.outputs.result }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          aider \
          --model openrouter/anthropic/claude-sonnet-4.5 \
          --yes \
          --read Architecture.md \
          --file ISSUE_COMMENT_REPLY.md \
          --message "You are the architect of Pydontology. Respond to this issue comment in ISSUE_COMMENT_REPLY.md.

          ISSUE CONTEXT:
          Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Original Issue Description:
          ${ISSUE_BODY}

          FULL COMMENT HISTORY:
          ${ALL_COMMENTS}

          LATEST COMMENT TO RESPOND TO:
          ${COMMENT_BODY}"

      - name: Reply to Issue Comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const reply = fs.readFileSync('./ISSUE_COMMENT_REPLY.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: reply
            })
